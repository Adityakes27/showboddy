<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShowBuddy - My Favorites</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; color: white; padding: 40px 60px; }
    .logo { font-size: 24px; font-weight: 800; color: #ff4d6d; margin-bottom: 10px; }
    a.back { color: #999; text-decoration: none; font-size: 14px; }
    h2 { margin: 20px 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .movie-card { background: #16161f; border-radius: 14px; overflow: hidden; }
    .poster { width: 100%; height: 280px; object-fit: cover; }
    .card-body { padding: 14px; }
    .movie-title { font-weight: 700; margin-bottom: 4px; }
    .movie-info { font-size: 12px; color: #999; }
  </style>
</head>
<body>

  <div class="logo">🎬 ShowBuddy</div>
  <a class="back" href="index.html">← Back to Shows</a>
  <h2>My Favorite Movies</h2>
  <div id="fav-list" class="grid">Loading...</div>

  <script>
    var userId = localStorage.getItem('userId');
    var container = document.getElementById('fav-list');

    if (!userId) {
      container.innerHTML = '<p>Please <a href="login.html" style="color:#ff8fa3;">login</a> to see your favorites.</p>';
    } else {
      fetch('http://localhost:8080/api/favorites/' + userId)
        .then(function(res) { return res.json(); })
        .then(function(favs) {
          container.innerHTML = '';
          if (favs.length === 0) {
            container.innerHTML = '<p>No favorites yet. Go add some ❤️</p>';
            return;
          }
          favs.forEach(function(fav) {
            var movie = fav.movie;
            var card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML =
              '<img class="poster" src="' + (movie.posterUrl || '') + '" alt="' + movie.title + '">' +
              '<div class="card-body">' +
                '<div class="movie-title">' + movie.title + '</div>' +
                '<div class="movie-info">' + movie.genre + '</div>' +
              '</div>';
            container.appendChild(card);
          });
        });
    }
  </script>

</body>
</html>
